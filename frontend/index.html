<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DH6018 Assignment 2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header>
      <a class="nav-brand" href="#">
        <div class="nav-logo-badge">DH</div>
        <h1>DH6018 Assignment 2</h1>
      </a>

      <nav class="tabs">
        <button class="tab active" data-tab="circuitgrid">Grid</button>
        <button class="tab" data-tab="gyroid">Gyroid</button>
        <button class="tab" data-tab="hopfthree">Hopf</button>
        <button class="tab" data-tab="morphogenesisthree">Morphogenesis</button>
        <button class="tab" data-tab="ripple">Ripple</button>
        <button class="tab" data-tab="chromaticfugue">Chromatic Fugue</button>
        <button class="tab" data-tab="driftatlas">Drift Atlas</button>
        <button class="tab" data-tab="probe">Probe</button>
      </nav>

    </header>

    <!-- Probe tab -->
    <div id="tab-probe" class="tab-content" hidden>
      <div class="main-content">

        <!-- Drawing panel -->
        <div class="panel draw-panel">
          <div class="panel-title">Draw your sketch</div>
          <div id="editor-container" class="editor-container"></div>
          <div class="toolbar upload-actions">
            <div class="toolbar-group" style="margin-left:auto">
              <button id="btn-clear" type="button" class="glow-btn-group probe-clear-btn">
                <div class="glow-btn-fill"></div>
                <div class="glow-btn-content">Clear all</div>
              </button>
              <button id="btn-search" type="button" class="glow-btn-group probe-search-btn">
                <div class="glow-btn-fill"></div>
                <div class="glow-btn-content">Search</div>
              </button>
            </div>
          </div>

          <div class="upload-divider"></div>

          <div class="panel-title">Upload image</div>
          <div id="upload-dropzone" class="upload-dropzone">
            <input id="upload-input" type="file" accept="image/*,.heic,.heif" hidden />
            <div id="upload-prompt" class="upload-prompt">
              <div class="upload-icon">&#8613;</div>
              <span>Drop an image here, or click to browse</span>
              <span class="upload-formats">JPG · PNG · WebP · HEIC · AVIF · TIFF · BMP</span>
            </div>
            <div id="upload-preview" class="upload-preview" hidden>
              <img id="upload-img" alt="Uploaded image" />
              <div id="upload-no-preview" class="upload-no-preview" hidden>
                <div class="upload-icon">&#10003;</div>
                <span>Image loaded — preview not available in this browser</span>
              </div>
            </div>
          </div>
          <div class="toolbar upload-actions">
            <div class="toolbar-group" style="margin-left:auto">
              <button id="btn-upload-clear" type="button" class="glow-btn-group probe-clear-btn" disabled>
                <div class="glow-btn-fill"></div>
                <div class="glow-btn-content">Clear</div>
              </button>
              <button id="btn-upload-search" type="button" class="glow-btn-group probe-search-btn" disabled>
                <div class="glow-btn-fill"></div>
                <div class="glow-btn-content">Search</div>
              </button>
            </div>
          </div>
        </div>

        <!-- Results panel -->
        <div class="panel results-panel">
          <div class="panel-title">Similar artworks</div>
          <div id="results-grid" class="results-grid" hidden></div>
          <div id="empty-state" class="empty-state">
            <div class="icon">&#128396;</div>
            <p>Draw a sketch and press Search to find similar artworks.</p>
          </div>
        </div>

      </div>
    </div>

    <!-- Generative sketch tabs -->
    <div id="tab-circuitgrid" class="tab-content tab-content-contained active">
      <div class="generative-layout">
        <div class="generative-sketch-canvas generative-sketch-canvas-contained" id="generative-sketch-2"></div>
      </div>
    </div>

    <div id="tab-gyroid" class="tab-content tab-content-contained" hidden>
      <div class="generative-layout">
        <div class="generative-sketch-canvas generative-sketch-canvas-contained" id="generative-sketch-3"></div>
      </div>
    </div>

    <div id="tab-hopfthree" class="tab-content tab-content-contained" hidden>
      <div class="generative-layout">
        <div class="generative-sketch-canvas generative-sketch-canvas-contained" id="generative-sketch-8"></div>
      </div>
    </div>

    <div id="tab-morphogenesisthree" class="tab-content tab-content-contained" hidden>
      <div class="generative-layout">
        <div class="generative-sketch-canvas generative-sketch-canvas-contained" id="generative-sketch-9"></div>
      </div>
    </div>

    <div id="tab-ripple" class="tab-content" hidden>
      <div class="generative-layout">
        <div class="generative-sketch-canvas" id="generative-sketch-10"></div>
      </div>
    </div>

    <div id="tab-chromaticfugue" class="tab-content" hidden>
      <div class="generative-layout">
        <div class="generative-sketch-canvas" id="generative-sketch-11"></div>
      </div>
    </div>

    <div id="tab-driftatlas" class="tab-content" hidden>
      <div class="generative-layout">
        <div class="generative-sketch-canvas" id="generative-sketch-13"></div>
      </div>
    </div>

  </div>

  <!-- Load p5 and GSAP as globals before the ES modules run -->
  <script src="https://cdn.jsdelivr.net/npm/p5@2.2.3/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "p5":                        "./util/p5-shim.js",
      "three":                     "https://esm.sh/three@0.180.0",
      "perfect-freehand":          "https://esm.sh/perfect-freehand@1.2.3",
      "@huggingface/transformers": "https://esm.sh/@huggingface/transformers@4.0.1"
    }
  }
  </script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
