<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sketch → Art</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <h1>Sketch → Art</h1>

      <!-- Tabs -->
      <nav class="tabs">
        <button class="tab active" data-tab="search">Search</button>
        <button class="tab" data-tab="palimpsest">Palimpsest</button>
      </nav>

      <div class="header-right">
        <label class="backend-label">
          Backend
          <input id="backend-url" type="text" value="http://localhost:8000"
                 spellcheck="false" class="backend-input" />
        </label>
      </div>
    </header>

    <!-- ═══════════════ Search Tab ═══════════════ -->
    <div id="tab-search" class="tab-content active">
      <div class="main-content">

        <!-- Drawing panel -->
        <div class="panel draw-panel">
          <div class="panel-title">Draw your sketch</div>
          <div id="editor-container" class="editor-container"></div>
          <div class="toolbar">
            <div class="toolbar-group" style="margin-left:auto">
              <button id="btn-clear" class="btn btn-danger">Clear all</button>
              <button id="btn-search" class="btn btn-primary">Search</button>
            </div>
          </div>
        </div>

        <!-- Results panel -->
        <div class="panel results-panel">
          <div class="panel-title">Similar artworks</div>
          <div id="results-grid" class="results-grid" hidden></div>
          <div id="empty-state" class="empty-state">
            <div class="icon">&#128396;</div>
            <p>Draw a sketch and press Search to find similar artworks.</p>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══════════════ Palimpsest Tab ═══════════════ -->
    <div id="tab-palimpsest" class="tab-content" hidden>
      <div class="palimpsest-layout">

        <!-- Sidebar: artwork selection -->
        <div class="panel palimpsest-sidebar">
          <div class="panel-title">Select artwork</div>

          <!-- Text search -->
          <div class="artwork-search">
            <input id="pal-search-input" type="text"
                   placeholder="Search by title or artist..."
                   class="search-input" />
            <button id="pal-search-btn" class="btn">Find</button>
            <button id="pal-random-btn" class="btn">Random</button>
          </div>

          <!-- Mini artwork grid -->
          <div id="pal-artwork-grid" class="artwork-mini-grid"></div>

          <!-- Selected artwork info -->
          <div id="pal-selected" class="selected-artwork" hidden>
            <div class="panel-title" style="margin-top:12px">Active artwork</div>
            <img id="pal-selected-img" />
            <div id="pal-selected-title" class="card-title"></div>
            <div id="pal-selected-meta" class="card-meta"></div>
          </div>
        </div>

        <!-- Main canvas -->
        <div class="panel palimpsest-main">
          <div class="panel-title">
            Draw to reveal
            <span id="pal-similarity" class="similarity-badge">Similarity: --</span>
          </div>
          <div id="palimpsest-canvas" class="palimpsest-canvas"></div>
          <div class="toolbar">
            <div class="toolbar-group">
              <label style="font-size:.75rem;color:var(--text-dim)">Brush</label>
              <input id="pal-brush" type="range" min="2" max="50" value="12" />
              <span id="pal-brush-label" style="font-size:.75rem;min-width:18px">12</span>
            </div>
            <div class="toolbar-group" style="margin-left:auto">
              <button id="pal-clear" class="btn btn-danger">Clear</button>
              <button id="pal-compute" class="btn btn-primary">Recompute similarity</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Status bar -->
    <footer class="status-bar">
      <span id="status-text">Loading...</span>
      <span>Enter = search</span>
    </footer>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
